<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你的人际求生模式测试</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #quizFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #shareBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 152px;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #111827, #374151);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.28);
      z-index: 9998;
      opacity: 0.95;
    }

    #shareBtn:active {
      transform: translateY(1px);
    }

    @media (max-width: 768px) {
      #toast {
        top: 16px;
        max-width: calc(100vw - 32px);
        white-space: normal;
        text-align: center;
      }

      #shareBtn {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: calc(100vw - 32px);
      }
    }
  </style>
</head>
<body>
  <iframe id="quizFrame" src="./index.html" title="你的人际求生模式测试"></iframe>
  <div id="toast" aria-live="polite"></div>
  <button id="shareBtn" type="button">复制链接分享</button>

  <script>
    const iframe = document.getElementById('quizFrame');
    const toast = document.getElementById('toast');
    const shareBtn = document.getElementById('shareBtn');
    let toastTimer = null;

    function showToast(message, duration = 2200) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    async function sharePage() {
      const shareUrl = window.location.href;
      try {
        await navigator.clipboard.writeText(shareUrl);
        showToast('链接已复制，请直接粘贴发送给朋友；发朋友圈请用右上角菜单', 2800);
      } catch (error) {
        showToast('复制失败，请手动复制当前链接');
      }
    }

    shareBtn.addEventListener('click', sharePage);
    iframe.addEventListener('load', () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (doc && doc.title) {
          document.title = doc.title;
        }
      } catch (error) {}
    });
  </script>
</body>
</html>
