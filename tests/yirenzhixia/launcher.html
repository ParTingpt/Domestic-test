<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一人之下角色测试</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #quizFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #shareBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 132px;
      padding: 12px 18px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #111827, #374151);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(17, 24, 39, 0.28);
      z-index: 9998;
    }

    #shareBtn.show {
      display: inline-flex;
    }

    #shareBtn:active {
      transform: translateY(1px);
    }

    @media (max-width: 768px) {
      #toast {
        top: 16px;
        max-width: calc(100vw - 32px);
        white-space: normal;
        text-align: center;
      }

      #shareBtn {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: calc(100vw - 32px);
      }
    }
  </style>
</head>
<body>
  <iframe id="quizFrame" src="./yirenzhixia_real_images_fixed_v6.html" title="一人之下角色测试"></iframe>
  <div id="toast" aria-live="polite"></div>
  <button id="shareBtn" type="button">分享给朋友</button>

  <script>
    const iframe = document.getElementById('quizFrame');
    const toast = document.getElementById('toast');
    const shareBtn = document.getElementById('shareBtn');

    let iframeDoc = null;
    let observer = null;
    let toastTimer = null;
    let pollTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    function getFrameWindow() {
      try {
        return iframe.contentWindow;
      } catch (error) {
        return null;
      }
    }

    function isVisible(el) {
      if (!el) return false;
      const frameWindow = getFrameWindow();
      if (!frameWindow) return false;
      const style = frameWindow.getComputedStyle(el);
      return style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0' && el.getClientRects().length > 0;
    }

    function getText(el) {
      return ((el && (el.innerText || el.textContent)) || '').replace(/\s+/g, ' ').trim();
    }

    function getVisibleOptions(root) {
      if (!root) return [];
      const selectors = [
        'input[type="radio"]',
        'input[type="checkbox"]',
        '.option',
        '.option-item',
        '.option-card',
        '.answer-option',
        '.choice',
        '.answer',
        '[role="radio"]',
        '[role="option"]'
      ];
      return Array.from(root.querySelectorAll(selectors.join(','))).filter(isVisible);
    }

    function findQuestionScope(target) {
      let node = target;
      while (node && node !== iframeDoc.body) {
        const options = getVisibleOptions(node);
        if (options.length >= 2) {
          return node;
        }
        node = node.parentElement;
      }

      const candidates = Array.from(iframeDoc.querySelectorAll('section, article, form, main, .container, .card, .screen, .page, .question, .question-card, .question-container, .quiz-container, div'))
        .filter((el) => isVisible(el) && getVisibleOptions(el).length >= 2)
        .sort((a, b) => a.querySelectorAll('*').length - b.querySelectorAll('*').length);

      return candidates[0] || null;
    }

    function hasAnswered(scope) {
      if (!scope) return true;

      if (scope.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked')) {
        return true;
      }

      if (Array.from(scope.querySelectorAll('select')).some((el) => !!el.value)) {
        return true;
      }

      if (Array.from(scope.querySelectorAll('.selected, .active, .chosen, .is-selected, [aria-checked="true"], [data-selected="true"]')).some(isVisible)) {
        return true;
      }

      return false;
    }

    function looksLikeProgressButton(target) {
      const button = target.closest('button, a, .btn, [role="button"]');
      if (!button) return null;
      const text = getText(button);
      if (/下一题|下一步|继续|提交|查看结果|生成结果|完成测试|揭晓结果/.test(text)) {
        return button;
      }
      return null;
    }

    function handleClick(event) {
      if (!iframeDoc) return;
      const button = looksLikeProgressButton(event.target);
      if (!button) return;

      const scope = findQuestionScope(button);
      const visibleOptions = scope ? getVisibleOptions(scope) : [];
      if (visibleOptions.length < 2) return;

      if (!hasAnswered(scope)) {
        event.preventDefault();
        event.stopPropagation();
        if (typeof event.stopImmediatePropagation === 'function') {
          event.stopImmediatePropagation();
        }
        showToast('请先选择一个答案');
      }
    }

    function resultIsVisible() {
      if (!iframeDoc || !iframeDoc.body) return false;

      const obviousResultNode = Array.from(
        iframeDoc.querySelectorAll('#result, .result, .result-page, .result-card, .result-container, .final-result, .outcome, .share-section')
      ).find(isVisible);
      if (obviousResultNode) return true;

      const visibleButtonsText = Array.from(iframeDoc.querySelectorAll('button, a, .btn, [role="button"]'))
        .filter(isVisible)
        .map(getText)
        .join(' ');

      const bodyText = getText(iframeDoc.body).slice(0, 2500);
      const hasResultHint = /测试结果|你的结果|你最像|你的角色|角色画像|匹配角色|本次结果/.test(bodyText);
      const hasEndAction = /再测一次|重新测试|重新开始|返回首页|回到首页/.test(visibleButtonsText + ' ' + bodyText);

      return hasResultHint && hasEndAction;
    }

    function updateShareButton() {
      shareBtn.classList.toggle('show', resultIsVisible());
    }

    async function sharePage() {
      const shareData = {
        title: iframeDoc && iframeDoc.title ? iframeDoc.title : '一人之下角色测试',
        text: '我刚做完《一人之下》角色测试，来看看你最像哪位角色。',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
          return;
        } catch (error) {
          if (error && error.name === 'AbortError') {
            return;
          }
        }
      }

      try {
        await navigator.clipboard.writeText(shareData.url);
        showToast('链接已复制，快发给朋友吧');
      } catch (error) {
        showToast('分享失败，请手动复制当前链接');
      }
    }

    function bindFrame() {
      try {
        iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      } catch (error) {
        iframeDoc = null;
      }

      if (!iframeDoc) return;

      document.title = iframeDoc.title || '一人之下角色测试';
      iframeDoc.addEventListener('click', handleClick, true);

      if (observer) {
        observer.disconnect();
      }
      if (pollTimer) {
        clearInterval(pollTimer);
      }

      observer = new MutationObserver(() => {
        updateShareButton();
      });

      observer.observe(iframeDoc.body || iframeDoc.documentElement, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class', 'style']
      });

      pollTimer = setInterval(updateShareButton, 800);
      updateShareButton();
    }

    shareBtn.addEventListener('click', sharePage);
    iframe.addEventListener('load', bindFrame);
  </script>
</body>
</html>
