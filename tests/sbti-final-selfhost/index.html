<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBTI-PLUS</title>
  <style>
    :root {
      --bg: #f8f6fc;
      --panel: rgba(255,255,255,.92);
      --text: #231a33;
      --muted: #6f6782;
      --line: #e6def3;
      --soft: #f2ecfb;
      --accent: #8b5cf6;
      --accent-2: #ec4899;
      --shadow: 0 18px 48px rgba(139, 92, 246, 0.10);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.14), transparent 35%),
        radial-gradient(circle at top right, rgba(236,72,153,.12), transparent 28%),
        linear-gradient(180deg, #fcfbff 0%, #f8f6fc 45%, #f4f0fb 100%);
      color: var(--text);
    }
    .shell { max-width: 1280px; margin: 0 auto; padding: 18px 14px 18px; height: 100%; display: flex; flex-direction: column; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      text-decoration: none; border-radius: 16px; padding: 12px 16px; font-weight: 800;
      transition: transform .16s ease, box-shadow .16s ease;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      color: #fff;
      border: none;
      background: linear-gradient(100deg, #7c3aed, #8b5cf6 42%, #ec4899 100%);
      box-shadow: 0 14px 28px rgba(139,92,246,.20);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .intro {
      padding: 18px 20px;
      margin-bottom: 12px;
      line-height: 1.8;
      color: var(--muted);
      font-size: 14px;
    }
    .intro strong { color: var(--text); }
    .frame-wrap {
      flex: 1 1 auto;
      min-height: 70vh;
      overflow: hidden;
      border-radius: 24px;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 170px);
      min-height: 760px;
      border: 0;
      background: #fff;
      display: block;
    }
    .fallback {
      display: none;
      padding: 22px;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .fallback.show { display: block; }
    @media (max-width: 860px) {
      iframe { height: calc(100vh - 210px); min-height: 640px; }
    }
    @media (max-width: 600px) {
      .shell { padding: 14px 10px 14px; }
      .intro { padding: 14px 16px; }
      iframe { height: calc(100vh - 230px); min-height: 560px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <a class="btn" href="../../index.html">← 返回测试主页</a>
      <a class="btn btn-primary" href="https://sbti-plus.netlify.app" target="_blank" rel="noopener noreferrer">新标签打开原版 SBTI</a>
    </div>

    <section class="intro card">
      <strong>SBTI-PLUS 已切换为原版界面预览。</strong>
      当前页面直接调用你参考的原版 <code>sbti-final-selfhost</code> 前端，因此结果图、第二备选人格结果等展示会与原版保持一致。
    </section>

    <section class="frame-wrap card">
      <iframe id="sbtiFrame" src="https://sbti-plus.netlify.app" title="SBTI-PLUS 原版前端"></iframe>
    </section>

    <section id="fallbackBox" class="fallback card">
      当前环境下如果内嵌加载失败，请直接点击上方“新标签打开原版 SBTI”。
    </section>
  </main>

  <script>
    const frame = document.getElementById('sbtiFrame');
    const fallback = document.getElementById('fallbackBox');
    let loaded = false;

    frame.addEventListener('load', () => {
      loaded = true;
    });

    setTimeout(() => {
      if (!loaded) fallback.classList.add('show');
    }, 3500);
  </script>
</body>
</html>
